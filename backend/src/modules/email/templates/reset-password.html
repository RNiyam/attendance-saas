<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Reset password</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111">
    <h1>Password reset</h1>
    <p>Hi {{userName}},</p>
    <p>We received a request to reset your password. This link expires in <strong>{{expiresInMinutes}}</strong> minutes.</p>
    <p>
      <a href="{{resetUrl}}" style="display: inline-block; padding: 10px 16px; background: #dc2626; color: #fff; text-decoration: none; border-radius: 6px">Reset password</a>
    </p>
    <p style="font-size: 12px; color: #666">If you did not request this, you can safely ignore this email.</p>
  </body>
</html>
