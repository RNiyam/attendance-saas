<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Company workspace invitation</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111">
    <h1>You are invited to your company workspace</h1>
    <p>Hi {{employeeName}},</p>
    <p><strong>{{invitedByName}}</strong> invited you to join <strong>{{organizationName}}</strong> on the HRMS platform.</p>
    <p>
      <a href="{{inviteUrl}}" style="display: inline-block; padding: 10px 16px; background: #16a34a; color: #fff; text-decoration: none; border-radius: 6px">Accept invitation</a>
    </p>
    <p style="font-size: 12px; color: #666">This link may expire. Contact your company HR admin if it no longer works.</p>
  </body>
</html>
