<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Profile setup complete</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111">
    <h1>Profile setup complete</h1>
    <p>Hi {{userName}},</p>
    <p>You have successfully completed your profile setup for <strong>{{organizationName}}</strong>.</p>
    <p>Your account has been assigned the <strong>{{role}}</strong> role, giving you the necessary access to manage and operate within the organization.</p>
    <p>
      <a href="{{loginUrl}}" style="display: inline-block; padding: 10px 16px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px">Access Dashboard</a>
    </p>
  </body>
</html>
